name: generate animation
on:
  schedule:
    # roda automaticamente a cada 24 horas
    - cron: "0 */24 * * *"
  workflow_dispatch:
  push:
    branches:
    - master

jobs:
  generate:
    permissions:
      contents: write
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - name: generate github-contribution-grid-snake.svg
        uses: Platane/snk/svg-only@v3
        with:
          github_user_name: ${{ github.repository_owner }}
          outputs: |
            # versão clara — cobra amarela, dots em azul Python
            dist/github-contribution-grid-snake.svg?color_snake=#FFD43B&color_dots=#c8d8e8,#4B8BBE,#306998,#1a4971&color_empty=#ebedf0
            # versão dark — cobra azul, dots em amarelo Python
            dist/github-contribution-grid-snake-dark.svg?color_snake=#306998&color_dots=#2d2d2d,#7a6000,#b38f00,#FFD43B&color_empty=#161b22

      - name: push github-contribution-grid-snake.svg to the output branch
        uses: crazy-max/ghaction-github-pages@v3.1.0
        with:
          target_branch: output
          build_dir: dist
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
